apiVersion: apps/v1
kind: Deployment
metadata:
  name: ncms-frontend
  namespace: ncms              # ← change to your OCP namespace/project
  labels:
    app: ncms-frontend
    version: "1.0.0"
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ncms-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ncms-frontend
        version: "1.0.0"
    spec:
      # OpenShift: do not specify runAsUser; OCP assigns a random UID
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ncms-frontend
          # ← Replace with your image registry path after pushing
          image: image-registry.openshift-image-registry.svc:5000/ncms/ncms-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
