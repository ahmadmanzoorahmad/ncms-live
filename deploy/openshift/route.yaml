apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ncms-frontend
  namespace: ncms              # ← change to your OCP namespace/project
  labels:
    app: ncms-frontend
spec:
  # ← Uncomment and set your hostname, or leave blank for auto-generated
  # host: ncms.apps.your-cluster.example.com
  to:
    kind: Service
    name: ncms-frontend
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
