apiVersion: v1
kind: Service
metadata:
  name: ncms-frontend
  namespace: ncms              # ← change to your OCP namespace/project
  labels:
    app: ncms-frontend
spec:
  selector:
    app: ncms-frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
